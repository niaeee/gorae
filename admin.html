<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고래.I | 출석부 관리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050510;
      --bg-card: rgba(8, 12, 28, 0.92);
      --bg-row: rgba(0, 245, 212, 0.02);
      --text: #d0d8e8;
      --text-dim: #5a6578;
      --cyan: #00f5d4;
      --purple: #7b2ff7;
      --pink: #f72585;
      --yellow: #fee440;
      --green: #06d6a0;
      --border: rgba(100, 180, 255, 0.12);
      --pixel: 'Press Start 2P', monospace;
      --sans: 'Noto Sans KR', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header h1 {
      font-family: var(--pixel);
      font-size: 14px;
      color: var(--cyan);
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(0, 245, 212, 0.3);
    }

    .header-badge {
      font-family: var(--pixel);
      font-size: 7px;
      color: var(--green);
      background: rgba(6, 214, 160, 0.1);
      border: 1px solid rgba(6, 214, 160, 0.25);
      padding: 4px 10px;
      letter-spacing: 1px;
    }

    .back-btn {
      font-family: var(--pixel);
      font-size: 8px;
      color: var(--text-dim);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 6px 14px;
      transition: all 0.2s;
    }

    .back-btn:hover {
      color: var(--cyan);
      border-color: var(--cyan);
    }

    /* ── Auth ── */
    .auth {
      max-width: 360px;
      margin: 80px auto;
      text-align: center;
    }

    .auth-icon {
      font-size: 32px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .auth label {
      display: block;
      font-family: var(--pixel);
      font-size: 8px;
      color: var(--text-dim);
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .auth input {
      width: 100%;
      background: rgba(0, 245, 212, 0.04);
      border: 1px solid rgba(0, 245, 212, 0.15);
      color: #fff;
      font-family: var(--pixel);
      font-size: 12px;
      padding: 12px 14px;
      outline: none;
      text-align: center;
      letter-spacing: 4px;
    }

    .auth input:focus { border-color: var(--cyan); }

    .auth button {
      margin-top: 14px;
      width: 100%;
      padding: 12px;
      background: rgba(0, 245, 212, 0.08);
      border: 1px solid rgba(0, 245, 212, 0.3);
      color: var(--cyan);
      font-family: var(--pixel);
      font-size: 9px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .auth button:hover { background: rgba(0, 245, 212, 0.15); }

    .auth-err {
      margin-top: 10px;
      font-size: 12px;
      color: var(--pink);
    }

    /* ── Dashboard ── */
    .dash { display: none; }
    .dash.show { display: block; }

    /* Stats Row */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 18px 16px;
      position: relative;
      overflow: hidden;
    }

    .stat::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
    }

    .stat.cyan::before { background: var(--cyan); }
    .stat.purple::before { background: var(--purple); }
    .stat.pink::before { background: var(--pink); }
    .stat.green::before { background: var(--green); }

    .stat-num {
      font-family: var(--pixel);
      font-size: 28px;
      color: #fff;
      line-height: 1;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 6px;
    }

    /* Month Tabs */
    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .tab {
      font-family: var(--pixel);
      font-size: 8px;
      padding: 8px 16px;
      letter-spacing: 1px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab:hover {
      color: var(--text);
      border-color: rgba(100, 180, 255, 0.3);
    }

    .tab.active {
      color: var(--cyan);
      border-color: var(--cyan);
      background: rgba(0, 245, 212, 0.06);
    }

    /* Actions bar */
    .actions {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .dl-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: rgba(0, 245, 212, 0.05);
      border: 1px solid rgba(0, 245, 212, 0.18);
      color: var(--cyan);
      font-family: var(--pixel);
      font-size: 7px;
      letter-spacing: 1px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }

    .dl-btn:hover {
      background: rgba(0, 245, 212, 0.12);
      border-color: var(--cyan);
    }

    .dl-btn .arrow { font-size: 12px; }

    /* Section */
    .section {
      margin-bottom: 24px;
      border: 1px solid var(--border);
      background: var(--bg-card);
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 8px;
    }

    .section-info {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .section-title {
      font-weight: 900;
      font-size: 15px;
      color: #fff;
    }

    .section-badge {
      font-family: var(--pixel);
      font-size: 7px;
      padding: 3px 8px;
      letter-spacing: 1px;
    }

    .badge-active {
      color: var(--green);
      border: 1px solid rgba(6, 214, 160, 0.3);
      background: rgba(6, 214, 160, 0.08);
    }

    .badge-inactive {
      color: var(--text-dim);
      border: 1px solid var(--border);
    }

    .section-count {
      font-family: var(--pixel);
      font-size: 10px;
      color: var(--cyan);
    }

    /* Table */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead { background: rgba(0, 245, 212, 0.03); }

    th {
      font-family: var(--pixel);
      font-size: 7px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-align: left;
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
    }

    td {
      font-size: 14px;
      padding: 10px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.025);
    }

    tr:hover td { background: var(--bg-row); }

    td.num {
      font-family: var(--pixel);
      font-size: 9px;
      color: var(--text-dim);
      width: 50px;
    }

    td.name-cell { font-weight: 700; color: #fff; }

    td.time-cell {
      font-family: var(--pixel);
      font-size: 8px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    .empty-row {
      text-align: center;
      padding: 28px;
      color: var(--text-dim);
      font-size: 13px;
    }

    /* Refresh */
    .refresh-btn {
      font-family: var(--pixel);
      font-size: 7px;
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }

    .refresh-btn:hover {
      color: var(--cyan);
      border-color: var(--cyan);
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 24px 0;
      font-family: var(--pixel);
      font-size: 7px;
      color: var(--text-dim);
      letter-spacing: 2px;
      border-top: 1px solid var(--border);
      margin-top: 20px;
    }

    @media (max-width: 600px) {
      .app { padding: 14px; }
      .header { flex-direction: column; align-items: flex-start; }
      th, td { padding: 8px 12px; font-size: 12px; }
    }

    /* Animation */
    .dash.show .stat { animation: fadeUp 0.4s ease both; }
    .dash.show .stat:nth-child(2) { animation-delay: 0.08s; }
    .dash.show .stat:nth-child(3) { animation-delay: 0.16s; }
    .dash.show .stat:nth-child(4) { animation-delay: 0.24s; }
    .section { animation: fadeUp 0.3s ease both; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1>GORAE.I ADMIN</h1>
        <span class="header-badge" id="headerBadge" style="display:none">ONLINE</span>
      </div>
      <a href="/" class="back-btn">&larr; MAIN</a>
    </header>

    <!-- Auth -->
    <div class="auth" id="authBox">
      <div class="auth-icon">&#9679;</div>
      <label>ADMIN KEY</label>
      <input type="password" id="keyInput" placeholder="&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;" />
      <button id="authBtn">LOGIN</button>
      <div class="auth-err" id="authErr"></div>
    </div>

    <!-- Dashboard -->
    <div class="dash" id="dash">
      <!-- Stats -->
      <div class="stats" id="stats"></div>

      <!-- Month Tabs -->
      <div class="tabs" id="tabs"></div>

      <!-- Actions -->
      <div class="actions" id="actions"></div>

      <!-- Lecture Sections -->
      <div id="sections"></div>

      <footer class="footer">
        <button class="refresh-btn" id="refreshBtn">REFRESH</button>
      </footer>
    </div>
  </div>

  <script>
    let adminKey = '';
    let currentMonth = null; // null = 전체
    let cachedData = null;

    const $ = id => document.getElementById(id);

    $('authBtn').addEventListener('click', login);
    $('keyInput').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    $('refreshBtn').addEventListener('click', () => fetchData());

    async function login() {
      const key = $('keyInput').value.trim();
      if (!key) return;

      try {
        const res = await fetch(`/api/admin/attendance?key=${encodeURIComponent(key)}`);
        if (res.status === 403) {
          $('authErr').textContent = '관리자 키가 올바르지 않습니다.';
          return;
        }
        adminKey = key;
        $('authBox').style.display = 'none';
        $('dash').classList.add('show');
        $('headerBadge').style.display = '';
        await fetchData();
      } catch {
        $('authErr').textContent = '서버 연결에 실패했습니다.';
      }
    }

    async function fetchData() {
      const params = new URLSearchParams({ key: adminKey });
      if (currentMonth) params.set('month', currentMonth);

      const res = await fetch(`/api/admin/attendance?${params}`);
      cachedData = await res.json();
      render(cachedData);
    }

    function fmtDate(iso) {
      const d = new Date(iso);
      const M = String(d.getMonth() + 1).padStart(2, '0');
      const D = String(d.getDate()).padStart(2, '0');
      const h = String(d.getHours()).padStart(2, '0');
      const m = String(d.getMinutes()).padStart(2, '0');
      return `${M}/${D} ${h}:${m}`;
    }

    function render(data) {
      const { months = [], lectures = {}, totalEntries = 0 } = data;
      const lectureIds = Object.keys(lectures);

      // Count per-month
      const monthCounts = {};
      for (const [, lec] of Object.entries(lectures)) {
        const m = lec.month || '?';
        monthCounts[m] = (monthCounts[m] || 0) + lec.total;
      }

      const activeLectures = lectureIds.filter(id => lectures[id].active).length;
      const totalLectures = lectureIds.length;

      // ── Stats ──
      let statsHTML = `
        <div class="stat cyan">
          <div class="stat-num">${totalEntries}</div>
          <div class="stat-label">${currentMonth ? currentMonth + ' ' : ''}총 출석</div>
        </div>
        <div class="stat purple">
          <div class="stat-num">${totalLectures}</div>
          <div class="stat-label">강의 수</div>
        </div>
        <div class="stat green">
          <div class="stat-num">${activeLectures}</div>
          <div class="stat-label">활성 강의</div>
        </div>
      `;
      // Per-month mini stats
      if (!currentMonth) {
        months.forEach(m => {
          statsHTML += `
            <div class="stat pink">
              <div class="stat-num">${monthCounts[m] || 0}</div>
              <div class="stat-label">${m} 출석</div>
            </div>
          `;
        });
      }
      $('stats').innerHTML = statsHTML;

      // ── Tabs ──
      let tabsHTML = `<button class="tab${!currentMonth ? ' active' : ''}" data-month="">전체</button>`;
      months.forEach(m => {
        tabsHTML += `<button class="tab${currentMonth === m ? ' active' : ''}" data-month="${m}">${m}</button>`;
      });
      $('tabs').innerHTML = tabsHTML;

      // Tab click handlers
      document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => {
          currentMonth = btn.dataset.month || null;
          fetchData();
        });
      });

      // ── Actions ──
      const dlParams = `key=${encodeURIComponent(adminKey)}`;
      const monthParam = currentMonth ? `&month=${encodeURIComponent(currentMonth)}` : '';
      let actionsHTML = `
        <a class="dl-btn" href="/api/admin/download?${dlParams}${monthParam}" download>
          <span class="arrow">&#8595;</span> ${currentMonth || '전체'} CSV 다운로드
        </a>
      `;
      lectureIds.forEach(id => {
        if (lectures[id].total > 0) {
          actionsHTML += `
            <a class="dl-btn" href="/api/admin/download?${dlParams}&lecture=${id}" download>
              <span class="arrow">&#8595;</span> ${lectures[id].name}
            </a>
          `;
        }
      });
      $('actions').innerHTML = actionsHTML;

      // ── Sections ──
      let sectionsHTML = '';
      lectureIds.forEach(id => {
        const lec = lectures[id];
        const statusBadge = lec.active
          ? '<span class="section-badge badge-active">ACTIVE</span>'
          : '<span class="section-badge badge-inactive">INACTIVE</span>';

        let tableBody = '';
        if (lec.attendees.length === 0) {
          tableBody = `<tr><td colspan="4" class="empty-row">출석 기록 없음</td></tr>`;
        } else {
          tableBody = lec.attendees.map((a, i) => `
            <tr>
              <td class="num">${String(i + 1).padStart(2, '0')}</td>
              <td class="name-cell">${a.name}</td>
              <td>${a.dept}</td>
              <td class="time-cell">${fmtDate(a.timestamp)}</td>
            </tr>
          `).join('');
        }

        sectionsHTML += `
          <div class="section">
            <div class="section-head">
              <div class="section-info">
                <span class="section-title">${lec.name}</span>
                ${statusBadge}
              </div>
              <span class="section-count">${lec.total}명</span>
            </div>
            <table>
              <thead>
                <tr>
                  <th>NO</th>
                  <th>NAME</th>
                  <th>DEPT</th>
                  <th>TIME</th>
                </tr>
              </thead>
              <tbody>${tableBody}</tbody>
            </table>
          </div>
        `;
      });

      if (lectureIds.length === 0) {
        sectionsHTML = '<div class="empty-row">해당 월에 등록된 강의가 없습니다.</div>';
      }

      $('sections').innerHTML = sectionsHTML;
    }
  </script>
</body>
</html>
