<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 직무역량 강화 교육 — AI챔피언 도전하기</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');

    :root {
      --bg: #0b0d11;
      --bg-card: rgba(255,255,255,0.035);
      --bg-glass: rgba(255,255,255,0.055);
      --bg-glass-hover: rgba(255,255,255,0.09);
      --text: #eef0f6;
      --text-2: rgba(238,240,246,0.72);
      --text-3: rgba(238,240,246,0.45);
      --blue: #5b9aff;
      --violet: #a78bfa;
      --teal: #34d399;
      --rose: #fb7185;
      --amber: #fbbf24;
      --lime: #a3e635;
      --grad: linear-gradient(135deg,#5b9aff,#a78bfa);
      --grad-warm: linear-gradient(135deg,#fb7185,#fbbf24);
      --grad-cool: linear-gradient(135deg,#34d399,#5b9aff);
      --grad-hero: linear-gradient(135deg,#667eea,#764ba2);
      --border: 1px solid rgba(255,255,255,0.07);
      --border-g: 1px solid rgba(255,255,255,0.11);
      --glow-b: 0 0 30px rgba(91,154,255,0.12);
      --r-sm: 12px;
      --r-md: 16px;
      --r-lg: 24px;
      --ease: cubic-bezier(.16,1,.3,1);
      --spring: cubic-bezier(.34,1.56,.64,1);
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body{
      font-family:"Pretendard Variable","Pretendard",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
      color:var(--text);background:var(--bg);min-height:100vh;overflow:hidden;
      -webkit-font-smoothing:antialiased;
    }

    /* ── Layout ── */
    .app{min-height:100vh;display:grid;grid-template-rows:auto 1fr auto;gap:6px;padding:8px;position:relative}

    .ambient{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.35;animation:orbF 22s ease-in-out infinite}
    .orb:nth-child(1){width:420px;height:420px;background:radial-gradient(circle,#5b9aff,transparent 70%);top:-8%;left:-4%;animation-delay:0s}
    .orb:nth-child(2){width:350px;height:350px;background:radial-gradient(circle,#a78bfa,transparent 70%);bottom:-8%;right:-4%;animation-delay:-8s}
    .orb:nth-child(3){width:280px;height:280px;background:radial-gradient(circle,#34d399,transparent 70%);top:35%;right:18%;animation-delay:-16s}
    @keyframes orbF{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(25px,-18px) scale(1.04)}66%{transform:translate(-18px,12px) scale(.96)}}

    /* ── Progress ── */
    .pbar{position:relative;z-index:2;height:3px;background:rgba(255,255,255,.05);border-radius:999px;overflow:hidden}
    .pfill{height:100%;width:0%;border-radius:999px;background:var(--grad);transition:width 500ms var(--ease)}
    .pfill::after{content:"";position:absolute;right:0;top:-2px;width:6px;height:6px;background:#fff;border-radius:50%;box-shadow:0 0 10px rgba(91,154,255,.7)}

    /* ── Stage ── */
    .stage{position:relative;z-index:2;border-radius:var(--r-lg);overflow:hidden;background:rgba(255,255,255,.015);border:var(--border);backdrop-filter:blur(2px)}
    .stage::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size:32px 32px;
      z-index:1;
    }

    .slide{position:absolute;inset:0;z-index:2;padding:clamp(16px,2.2vw,32px);display:grid;grid-template-rows:auto 1fr;gap:10px;will-change:transform,opacity;outline:none;overflow-y:auto;-webkit-overflow-scrolling:touch}
    .slide > *:nth-child(2){align-self:start}
    .slide.aR{animation:sR .55s var(--ease) both}
    .slide.aL{animation:sL .55s var(--ease) both}
    @keyframes sR{from{transform:translateX(50px);opacity:0}to{transform:none;opacity:1}}
    @keyframes sL{from{transform:translateX(-50px);opacity:0}to{transform:none;opacity:1}}

    .slide [data-a]{opacity:0;transform:translateY(18px);animation:rev .55s var(--ease) forwards}
    @keyframes rev{to{opacity:1;transform:none}}

    /* ── Components ── */
    .kicker{display:inline-flex;align-items:center;gap:7px;padding:7px 14px;border-radius:999px;font-weight:600;font-size:clamp(.85rem,1vw,1rem);letter-spacing:.04em;text-transform:uppercase;background:var(--bg-glass-hover);border:var(--border-g);color:var(--text-2)}
    .kdot{width:5px;height:5px;border-radius:50%;background:var(--blue);animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}

    h2.t{font-size:clamp(2rem,5vw,4.8rem);line-height:1.06;letter-spacing:-.035em;font-weight:800;text-wrap:balance}
    .gt{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .gw{background:var(--grad-warm);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .gc{background:var(--grad-cool);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .sub{margin:6px 0 0;font-size:clamp(1.1rem,1.8vw,1.55rem);font-weight:500;color:var(--text-2);line-height:1.5}

    .g{background:var(--bg-glass);border:var(--border-g);border-radius:var(--r-md);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:14px 16px;transition:transform .3s var(--ease),box-shadow .3s var(--ease),background .3s ease}
    .g:hover{background:var(--bg-glass-hover);transform:translateY(-1px);box-shadow:var(--glow-b)}
    .g h3{font-size:clamp(1.15rem,1.5vw,1.5rem);font-weight:700;margin:0 0 5px;line-height:1.25}
    .g p,.g li{font-size:clamp(1rem,1.15vw,1.2rem);line-height:1.5;color:var(--text-2);font-weight:450}
    .g ul{margin:0;padding-left:1.15rem;display:grid;gap:3px}

    .g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}

    .chip{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:999px;font-size:clamp(.9rem,1vw,1rem);font-weight:600;background:var(--bg-glass-hover);border:var(--border-g);color:var(--text);transition:transform .2s var(--spring)}
    .chip:hover{transform:scale(1.03)}
    .cb{background:rgba(91,154,255,.13);color:var(--blue)}
    .cv{background:rgba(167,139,250,.13);color:var(--violet)}
    .ct{background:rgba(52,211,153,.13);color:var(--teal)}
    .cr{background:rgba(251,113,133,.13);color:var(--rose)}
    .ca{background:rgba(251,191,36,.13);color:var(--amber)}

    .kp{padding:12px 16px;border-radius:var(--r-md);background:rgba(91,154,255,.07);border-left:3px solid var(--blue);font-size:clamp(1rem,1.2vw,1.2rem);font-weight:600;line-height:1.45;color:var(--text)}
    .kp-w{background:rgba(251,113,133,.07);border-left-color:var(--rose)}

    .hb{padding:16px 22px;border-radius:var(--r-lg);background:var(--grad-hero);position:relative;overflow:hidden}
    .hb::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(-45deg,transparent,transparent 10px,rgba(255,255,255,.03) 10px,rgba(255,255,255,.03) 20px);pointer-events:none}
    .ht{font-size:clamp(1.3rem,2vw,1.9rem);font-weight:800;line-height:1.35;position:relative;z-index:1}
    .hs{font-size:clamp(.85rem,1vw,1rem);font-weight:500;color:rgba(255,255,255,.65);margin-top:6px;position:relative;z-index:1}

    .qb{position:relative;padding:14px 18px;border-radius:var(--r-md);background:var(--bg-glass);border:var(--border-g)}
    .qb::before{content:"\201C";position:absolute;top:-8px;left:10px;font-size:3rem;font-weight:900;color:rgba(91,154,255,.18);font-family:Georgia,serif;line-height:1}
    .qt{font-size:clamp(1.05rem,1.4vw,1.35rem);font-weight:700;line-height:1.45}

    .hb2{color:var(--blue)}.hv{color:var(--violet)}.htl{color:var(--teal)}.hr{color:var(--rose)}.ha{color:var(--amber)}

    .dv{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);margin:6px 0}

    /* ── Meta items ── */
    .mi{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--r-sm);background:var(--bg-glass);border:var(--border-g);font-weight:600;font-size:clamp(.95rem,1.08vw,1.08rem);transition:background .2s ease}
    .mi:hover{background:var(--bg-glass-hover)}
    .micon{width:30px;height:30px;display:inline-grid;place-items:center;border-radius:8px;background:var(--bg-glass-hover);font-size:.85rem;flex-shrink:0}

    /* ── Timeline ── */
    .tf{display:grid;gap:6px;padding-left:2px}
    .ti{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:center;padding:9px 12px;border-radius:var(--r-sm);background:var(--bg-glass);border:var(--border-g);transition:background .2s ease,transform .2s var(--ease)}
    .ti:hover{background:var(--bg-glass-hover);transform:translateX(3px)}
    .td{width:8px;height:8px;border-radius:50%;background:var(--grad);box-shadow:0 0 8px rgba(91,154,255,.35)}
    .tt strong{font-size:clamp(1rem,1.2vw,1.2rem);display:block;margin-bottom:1px}
    .tt span{font-size:clamp(.9rem,1vw,1rem);color:var(--text-3);font-weight:500}

    /* ── Stat ── */
    .sb{font-size:clamp(2.5rem,5vw,4.5rem);font-weight:900;letter-spacing:-.03em;line-height:1;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .sl{font-size:clamp(.82rem,.95vw,.95rem);color:var(--text-3);font-weight:600;margin-top:3px}

    /* ── Table ── */
    .ctbl{width:100%;border-collapse:separate;border-spacing:0 5px}
    .ctbl th{padding:8px 12px;font-size:clamp(.73rem,.82vw,.82rem);font-weight:700;color:var(--text-3);text-align:left;text-transform:uppercase;letter-spacing:.04em}
    .ctbl td{padding:10px 14px;font-size:clamp(1rem,1.1vw,1.15rem);font-weight:500;color:var(--text-2);background:var(--bg-glass);line-height:1.4}
    .ctbl tr td:first-child{border-radius:10px 0 0 10px;font-weight:700;color:var(--text)}
    .ctbl tr td:last-child{border-radius:0 10px 10px 0}

    /* ── Grade cards ── */
    .gc-card{position:relative;overflow:hidden}
    .gc-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px}
    .gc-green::before{background:var(--teal)}
    .gc-blue::before{background:var(--blue)}
    .gc-black::before{background:var(--text)}
    .gl{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-weight:700;font-size:.78rem;margin-bottom:8px}
    .gc-green .gl{background:rgba(52,211,153,.13);color:var(--teal)}
    .gc-blue .gl{background:rgba(91,154,255,.13);color:var(--blue)}
    .gc-black .gl{background:rgba(255,255,255,.08);color:var(--text)}

    /* ── Relay ── */
    .rf{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;gap:10px;align-items:stretch}
    .ra{display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:var(--text-3);animation:arP 1.5s ease-in-out infinite}
    @keyframes arP{0%,100%{opacity:.35;transform:translateX(0)}50%{opacity:1;transform:translateX(3px)}}

    /* ── Exam scores ── */
    .eg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .ec{text-align:center;padding:18px 14px}
    .es{font-size:clamp(1.8rem,2.8vw,2.8rem);font-weight:900;line-height:1}
    .el{font-size:clamp(.82rem,.95vw,.95rem);font-weight:600;color:var(--text-2);margin-top:5px}
    .ed{font-size:clamp(.72rem,.82vw,.82rem);color:var(--text-3);margin-top:3px}

    /* ── Warning ── */
    .wc{position:relative;overflow:hidden}
    .wc::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--grad-warm)}

    /* ── Impact ── */
    .impact{font-size:clamp(4rem,10vw,10rem);font-weight:900;letter-spacing:-.04em;line-height:1;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center}
    .impact-s{text-align:center;font-size:clamp(1.2rem,1.8vw,1.6rem);font-weight:600;color:var(--text-2);margin-top:10px}

    /* ── Center layout ── */
    .cl{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center}

    /* ── Closing ── */
    .closing-t{font-size:clamp(2.2rem,5.5vw,5.5rem);font-weight:900;letter-spacing:-.03em;line-height:1.1;text-align:center}
    .closing-s{font-size:clamp(.95rem,1.4vw,1.3rem);font-weight:500;color:var(--text-2);max-width:560px;line-height:1.6;text-align:center}

    /* ── Recap ── */
    .rl{display:grid;gap:7px;width:100%;max-width:520px}
    .ri{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--r-sm);background:var(--bg-glass);border:var(--border-g);font-weight:600;font-size:clamp(1rem,1.2vw,1.2rem);transition:background .2s ease,transform .2s var(--ease)}
    .ri:hover{background:var(--bg-glass-hover);transform:translateX(3px)}
    .rc{width:22px;height:22px;display:inline-grid;place-items:center;border-radius:6px;background:rgba(91,154,255,.13);color:var(--blue);font-size:.65rem;font-weight:900;flex-shrink:0}

    /* ── Slide num ── */
    .sn{position:absolute;top:14px;right:14px;z-index:10;font-weight:700;font-size:.72rem;color:var(--text-3);opacity:.45}

    /* ── Footer ── */
    .footer{position:relative;z-index:2;display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-radius:var(--r-md);background:var(--bg-glass);border:var(--border-g);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
    .brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:.85rem;color:var(--text-2)}
    .bdot{width:7px;height:7px;border-radius:50%;background:var(--grad)}
    .cnt{padding:3px 10px;border-radius:999px;background:var(--bg-glass-hover);font-weight:700;font-size:.75rem;color:var(--text-3)}
    .btns{display:flex;gap:6px}
    button{padding:7px 16px;border:var(--border-g);border-radius:var(--r-sm);background:var(--bg-glass);color:var(--text);font-weight:700;font-size:.82rem;cursor:pointer;backdrop-filter:blur(10px);transition:background .2s ease,transform .15s var(--spring),box-shadow .2s ease;font-family:inherit}
    button:hover:not(:disabled){background:var(--bg-glass-hover);transform:translateY(-1px);box-shadow:var(--glow-b)}
    button:active:not(:disabled){transform:translateY(1px);transition-duration:60ms}
    button:disabled{opacity:.25;cursor:not-allowed}

    .khint{position:fixed;bottom:65px;right:18px;z-index:100;display:flex;gap:4px;opacity:0;transition:opacity .4s ease;pointer-events:none}
    .khint.show{opacity:1}
    .khint kbd{display:inline-flex;align-items:center;justify-content:center;min-width:30px;height:30px;padding:0 7px;border-radius:6px;background:var(--bg-glass-hover);border:var(--border-g);font-weight:700;font-size:.72rem;color:var(--text-3);font-family:inherit}

    /* ── 4-grid change card ── */
    .chg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .chg-card{display:flex;gap:14px;align-items:flex-start}
    .chg-icon{width:40px;height:40px;border-radius:10px;background:var(--bg-glass-hover);display:inline-grid;place-items:center;font-size:1.2rem;flex-shrink:0}
    .chg-card h3{font-size:clamp(.98rem,1.2vw,1.2rem);margin-bottom:4px}

    /* ── Path num ── */
    .pn{font-size:clamp(2.5rem,3.5vw,3.5rem);font-weight:900;color:rgba(255,255,255,.05);line-height:1;position:absolute;top:10px;right:14px}

    /* ── Images ── */
    .logo-img{width:56px;height:56px;border-radius:14px;object-fit:contain;background:rgba(255,255,255,.9);padding:5px;flex-shrink:0}
    .logo-img-lg{width:72px;height:72px;border-radius:16px;padding:6px}
    .logo-img-sm{width:40px;height:40px;border-radius:10px;padding:4px}
    .photo{width:100%;max-height:220px;object-fit:cover;border-radius:var(--r-sm);border:var(--border-g)}
    .photo-sm{max-height:160px}
    .model-head{display:flex;align-items:center;gap:12px;margin-bottom:8px}

    /* ── Responsive ── */
    @media(max-width:980px){
      .g3,.g4,.eg{grid-template-columns:repeat(2,1fr)}
      .rf{grid-template-columns:1fr}.ra{transform:rotate(90deg);justify-self:center;padding:4px 0}
      .chg{grid-template-columns:1fr}
    }
    @media(max-width:700px){
      .app{padding:7px;gap:7px}
      .g2,.g3,.g4,.eg,.chg{grid-template-columns:1fr}
      .rf{grid-template-columns:1fr}.ra{transform:rotate(90deg);justify-self:center}
      .slide{padding:14px}.footer{flex-wrap:wrap;gap:7px}
    }
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
  </style>
</head>
<body>
  <div class="ambient"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
  <div class="app">
    <div class="pbar" role="progressbar" aria-valuemax="24"><div id="pf" class="pfill"></div></div>
    <main class="stage" aria-live="polite"><section id="sl" class="slide" tabindex="0"></section></main>
    <footer class="footer">
      <div class="brand"><img src="img/grae-i_logo.png" alt="고래.I" style="width:24px;height:24px;border-radius:6px;object-fit:contain;background:rgba(255,255,255,.85);padding:2px"><span>AI 직무역량 강화 교육</span><span id="cnt" class="cnt">1 / 24</span></div>
      <div class="btns"><button id="bp" aria-label="이전">← 이전</button><button id="bn" aria-label="다음">다음 →</button></div>
    </footer>
  </div>
  <div id="kh" class="khint"><kbd>←</kbd><kbd>→</kbd></div>

<script>
const S = [

/* ── 1. 표지 ── */
{id:"cover",r:()=>`
<div>
  <span class="kicker" data-a style="animation-delay:0ms"><span class="kdot"></span>울산 북구청 · 2026년 3월</span>
  <h1 style="font-size:clamp(2.8rem,7vw,7rem);line-height:1.04;letter-spacing:-.04em;font-weight:900;margin-top:8px" data-a style="animation-delay:80ms">
    <span class="gt">AI챔피언</span> 도전하기
  </h1>
  <p class="sub" data-a style="animation-delay:160ms">울산 북구청 AI 직무역량 강화 교육</p>
</div>
<div style="display:flex;flex-direction:column;justify-content:flex-end;gap:14px" data-a style="animation-delay:240ms">
  <div class="g2">
    <div class="g" style="display:flex;flex-direction:column;gap:10px;">
      <div style="display:flex;align-items:center;gap:12px">
        <img class="logo-img" src="img/grae-i_logo.png" alt="고래.I">
        <div>
          <h3 style="margin:0">강사 이홍우 주무관</h3>
          <p style="margin:0">울산광역시교육청 정책관실 정책기획팀</p>
        </div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:auto">
        <span class="chip cb">AI 챔피언 블루 인증</span>
        <span class="chip cv">고래.I 강사</span>
        <span class="chip ct">교육부 데이터리더</span>
      </div>
    </div>
    <div class="hb">
      <div class="ht">AI가 어렵게 느껴지셨나요?<br>오늘 끝나면<br>"이 정도면 나도 할 수 있겠다"가 됩니다.</div>
      <div class="hs" style="margin-top:12px;">
        <span class="chip" style="background:rgba(255,255,255,.15);color:#fff;font-size:.82rem;">👥 40명</span>
        <span class="chip" style="background:rgba(255,255,255,.15);color:#fff;font-size:.82rem;margin-left:4px;">⏱ 2시간</span>
      </div>
    </div>
  </div>
</div>`},

/* ── 2. 강사 소개 ── */
{id:"instructor",r:()=>`

/* ── Engine ── */
let c=0;
const $s=document.getElementById("sl"),$p=document.getElementById("pf"),$c=document.getElementById("cnt"),$bp=document.getElementById("bp"),$bn=document.getElementById("bn"),$kh=document.getElementById("kh"),T=S.length;

function go(i,d){
  if(i<0||i>=T)return;c=i;
  $s.className="slide "+(d>0?"aR":d<0?"aL":"aR");
  $s.innerHTML='<span class="sn">'+(c+1)+"</span>"+S[c].r();
  $p.style.width=((c+1)/T*100)+"%";
  $c.textContent=(c+1)+" / "+T;
  $bp.disabled=c===0;$bn.disabled=c===T-1;
  $s.scrollTop=0;$s.focus({preventScroll:true});
}

$bp.addEventListener("click",()=>go(c-1,-1));
$bn.addEventListener("click",()=>go(c+1,1));
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"||e.key===" "){e.preventDefault();go(c+1,1)}
  if(e.key==="ArrowLeft"){e.preventDefault();go(c-1,-1)}
});

let tx=0;
$s.addEventListener("touchstart",e=>{tx=e.changedTouches[0].clientX},{passive:true});
$s.addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50)dx<0?go(c+1,1):go(c-1,-1)},{passive:true});

setTimeout(()=>{$kh.classList.add("show");setTimeout(()=>$kh.classList.remove("show"),3000)},1500);
go(0,0);
</script>
