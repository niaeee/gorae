<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고래.I 오리엔테이션 2026</title>
  <style>
    :root {
      --ink: #0f172a;
      --paper: #f8fafc;
      --blue: #3b82f6;
      --cyan: #22d3ee;
      --pink: #fb7185;
      --lime: #84cc16;
      --amber: #f59e0b;
      --violet: #8b5cf6;
      --brutal-border: 4px solid var(--ink);
      --brutal-shadow: 8px 8px 0 var(--ink);
      --brutal-shadow-sm: 5px 5px 0 var(--ink);
      --brutal-shadow-lg: 12px 12px 0 var(--ink);
      --radius: 18px;
      --ease-bounce: cubic-bezier(.2, .7, .2, 1.2);
      --ease-smooth: cubic-bezier(.2, .7, .2, 1);
    }

    * { box-sizing: border-box; margin: 0; }

    body {
      font-family: "Pretendard", "SUIT", "Segoe UI", sans-serif;
      color: var(--ink);
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 15%, #cffafe 0, #cffafe 22%, transparent 23%),
        radial-gradient(circle at 88% 25%, #fde68a 0, #fde68a 20%, transparent 21%),
        radial-gradient(circle at 22% 85%, #fecdd3 0, #fecdd3 22%, transparent 23%),
        linear-gradient(140deg, #fef3c7 0%, #dbeafe 45%, #fce7f3 100%);
      overflow: hidden;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
      padding: 14px;
    }

    /* ── Progress ── */
    .progress-wrap {
      border: var(--brutal-border);
      border-radius: 999px;
      background: #fff;
      box-shadow: var(--brutal-shadow-sm);
      height: 24px;
      overflow: hidden;
      position: relative;
    }

    .progress {
      height: 100%;
      width: 0%;
      transition: width 600ms var(--ease-smooth);
      background: linear-gradient(
        90deg,
        var(--blue),
        var(--cyan),
        var(--lime),
        var(--amber),
        var(--pink)
      );
      background-size: 300% 100%;
      animation: progressGlow 8s ease-in-out infinite;
      border-radius: 999px;
    }

    @keyframes progressGlow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ── Stage ── */
    .stage {
      position: relative;
      border: 5px solid var(--ink);
      border-radius: calc(var(--radius) + 6px);
      box-shadow: var(--brutal-shadow-lg);
      overflow: hidden;
      background: #fff;
      isolation: isolate;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(15, 23, 42, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 23, 42, 0.04) 1px, transparent 1px);
      background-size: 28px 28px;
      z-index: 1;
    }

    /* ── Slides ── */
    .slide {
      position: absolute;
      inset: 0;
      z-index: 2;
      padding: clamp(18px, 2.8vw, 40px);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 18px;
      background: linear-gradient(165deg, rgba(255,255,255,.97), rgba(239,246,255,.96));
      will-change: transform, opacity;
      outline: none;
    }

    .slide.enter-right { animation: enterRight .5s var(--ease-smooth) both; }
    .slide.enter-left  { animation: enterLeft  .5s var(--ease-smooth) both; }

    @keyframes enterRight {
      from { transform: translateX(16%) rotate(1.5deg) scale(.96); opacity: 0; }
      to   { transform: translateX(0) rotate(0) scale(1); opacity: 1; }
    }
    @keyframes enterLeft {
      from { transform: translateX(-16%) rotate(-1.5deg) scale(.96); opacity: 0; }
      to   { transform: translateX(0) rotate(0) scale(1); opacity: 1; }
    }

    /* ── Staggered card animation ── */
    .slide [data-anim] {
      opacity: 0;
      transform: translateY(22px) scale(.97);
      animation: cardReveal .5s var(--ease-bounce) forwards;
    }

    @keyframes cardReveal {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Kicker ── */
    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: max-content;
      border: 3px solid var(--ink);
      border-radius: 999px;
      background: #fff;
      box-shadow: var(--brutal-shadow-sm);
      padding: 10px 18px;
      font-weight: 800;
      letter-spacing: .01em;
      font-size: clamp(1rem, 1.3vw, 1.2rem);
      transition: transform 200ms var(--ease-bounce), box-shadow 200ms ease;
    }

    .kicker:hover {
      transform: translate(-2px, -2px) rotate(-1deg);
      box-shadow: 8px 8px 0 var(--ink);
    }

    /* ── Title ── */
    .title {
      margin: 8px 0 0;
      font-size: clamp(2.8rem, 6.5vw, 7rem);
      line-height: 1.05;
      letter-spacing: -.03em;
      font-weight: 900;
      text-wrap: balance;
    }

    .title .accent {
      position: relative;
      display: inline-block;
    }

    .title .accent::after {
      content: "";
      position: absolute;
      bottom: .05em;
      left: -.04em;
      right: -.04em;
      height: .32em;
      background: #fde68a;
      z-index: -1;
      border-radius: 4px;
      transform: rotate(-.5deg);
    }

    /* ── Name ── */
    .name-main {
      font-weight: 950;
      letter-spacing: -.03em;
    }

    .name-sub {
      font-size: .45em;
      font-weight: 800;
      margin-left: .18em;
      padding: .12em .5em;
      border: 3px solid var(--ink);
      border-radius: 999px;
      background: #fff;
      box-shadow: 3px 3px 0 var(--ink);
      vertical-align: middle;
      display: inline-block;
    }

    .subtitle {
      margin: 12px 0 0;
      font-size: clamp(1.2rem, 2.2vw, 2rem);
      font-weight: 650;
      color: #1e293b;
      text-wrap: pretty;
      white-space: pre-line;
      line-height: 1.45;
    }

    /* ── Panel ── */
    .panel {
      border: var(--brutal-border);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--brutal-shadow-sm);
      padding: 16px;
    }

    /* ── Grids ── */
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    /* ── Card ── */
    .card {
      border: var(--brutal-border);
      border-radius: 16px;
      background: #fff;
      box-shadow: var(--brutal-shadow-sm);
      padding: 16px;
      transition: transform 200ms var(--ease-bounce), box-shadow 200ms ease;
      position: relative;
    }

    .card:hover {
      transform: translate(-3px, -3px);
      box-shadow: 10px 10px 0 var(--ink);
    }

    .card:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--ink);
      transition-duration: 80ms;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: clamp(1.22rem, 1.8vw, 2rem);
      line-height: 1.2;
    }

    .card p,
    .card li {
      font-size: clamp(1rem, 1.28vw, 1.35rem);
      line-height: 1.5;
    }

    .card ul {
      margin: 0;
      padding-left: 1.25rem;
      display: grid;
      gap: 8px;
    }

    /* ── Agenda ── */
    .agenda-flow {
      position: relative;
      display: grid;
      gap: 10px;
      margin-top: 4px;
      padding-left: 6px;
    }

    .agenda-flow::before {
      content: "";
      position: absolute;
      left: 24px;
      top: 8px;
      bottom: 8px;
      width: 4px;
      border-radius: 999px;
      background: repeating-linear-gradient(
        180deg,
        rgba(15,23,42,.95),
        rgba(15,23,42,.95) 9px,
        rgba(15,23,42,.16) 9px,
        rgba(15,23,42,.16) 17px
      );
      pointer-events: none;
    }

    .agenda-item {
      position: relative;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 10px;
      border: 2px solid var(--ink);
      border-radius: 12px;
      padding: 6px 12px 6px 8px;
      background: #fff;
      box-shadow: 2px 2px 0 var(--ink);
      transition: transform 200ms var(--ease-bounce), box-shadow 200ms ease;
      cursor: default;
    }

    .agenda-item:hover,
    .agenda-item:focus-visible {
      transform: translate(-2px, -2px) rotate(-.3deg);
      box-shadow: 5px 5px 0 var(--ink);
      outline: none;
    }

    .agenda-item.is-lime { background: linear-gradient(145deg, #ecfccb, #d9f99d); }
    .agenda-item.is-pink { background: linear-gradient(145deg, #fce7f3, #fbcfe8); }
    .agenda-item.is-cyan { background: linear-gradient(145deg, #cffafe, #a5f3fc); }
    .agenda-item.is-amber { background: linear-gradient(145deg, #fef9c3, #fde68a); }
    .agenda-item.is-blue { background: linear-gradient(145deg, #dbeafe, #bfdbfe); }

    .agenda-order {
      display: inline-grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      background: #fff;
      font-weight: 900;
      font-size: .85rem;
      box-shadow: 1px 1px 0 var(--ink);
      z-index: 1;
    }

    .agenda-text {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .agenda-text strong {
      font-size: clamp(1.12rem, 1.3vw, 1.35rem);
      line-height: 1.2;
      letter-spacing: -.01em;
    }

    .agenda-text span {
      font-size: clamp(.95rem, 1.05vw, 1.1rem);
      color: #475569;
      font-weight: 650;
      line-height: 1.2;
    }

    .agenda-label {
      font-size: clamp(1rem, 1.15vw, 1.18rem);
      line-height: 1.2;
      letter-spacing: -.01em;
    }

    .num {
      display: inline-grid;
      place-items: center;
      width: 48px;
      aspect-ratio: 1;
      border: 3px solid var(--ink);
      border-radius: 10px;
      font-size: 1.2rem;
      font-weight: 900;
      background: #fde68a;
      margin-right: 8px;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
      font-weight: 700;
      color: #334155;
    }

    /* ── Logo ── */
    .logo {
      width: 52px;
      height: 52px;
      object-fit: contain;
      background: #fff;
      border: 3px solid var(--ink);
      border-radius: 14px;
      box-shadow: var(--brutal-shadow-sm);
      padding: 6px;
    }

    .cover-logo {
      width: 74px;
      height: 74px;
      padding: 5px;
      border-width: 4px;
      border-radius: 18px;
      margin-right: 8px;
      background: linear-gradient(145deg, #ffffff 0%, #fef3c7 45%, #dbeafe 100%);
      box-shadow:
        0 0 0 3px #fff,
        0 0 0 7px var(--ink),
        9px 9px 0 var(--ink),
        0 0 20px rgba(34,211,238,.55);
      transform: rotate(-6deg);
      animation: coverLogoPunch 2.4s ease-in-out infinite;
    }

    @keyframes coverLogoPunch {
      0%, 100% { transform: rotate(-6deg) scale(1); }
      50% { transform: rotate(-3deg) scale(1.08); }
    }

    /* ── Instructor ── */
    .instructor-title {
      margin: 10px 0 0;
      font-size: clamp(2.4rem, 5.2vw, 5.4rem);
      line-height: 1.04;
      letter-spacing: -.02em;
      font-weight: 950;
    }

    .instructor-wrap {
      display: grid;
      grid-template-columns: 1.25fr .75fr;
      gap: 14px;
      min-height: 0;
    }

    .instructor-wrap .card { height: 100%; }

    .instructor-photo {
      width: 100%;
      height: min(40vh, 360px);
      object-fit: cover;
      border: 3px solid var(--ink);
      border-radius: 14px;
      box-shadow: var(--brutal-shadow-sm);
      background: #fff;
      transition: transform 300ms var(--ease-bounce), box-shadow 300ms ease;
    }

    .instructor-photo:hover {
      transform: scale(1.015) rotate(-.5deg);
      box-shadow: 10px 10px 0 var(--ink);
    }

    .instructor-meta {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .meta-pill {
      border: 3px solid var(--ink);
      border-radius: 12px;
      background: #fff;
      box-shadow: 3px 3px 0 var(--ink);
      padding: 10px 12px;
      font-weight: 800;
      font-size: clamp(.95rem, 1.05vw, 1.1rem);
      line-height: 1.35;
      transition: transform 160ms var(--ease-bounce), box-shadow 160ms ease;
    }

    .meta-pill:hover {
      transform: translate(-2px, -2px) rotate(-1deg);
      box-shadow: 6px 6px 0 var(--ink);
    }

    .instructor-caption {
      margin: 6px 0 0;
      font-size: clamp(1rem, 1.25vw, 1.22rem);
      font-weight: 750;
      color: #334155;
      line-height: 1.35;
    }

    /* ── Instructor message ── */
    .instructor-message {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }

    .instructor-message::before {
      content: "\201C";
      position: absolute;
      top: -20px;
      left: -8px;
      font-size: 10rem;
      font-weight: 900;
      color: rgba(15,23,42,.06);
      line-height: 1;
      pointer-events: none;
      font-family: Georgia, serif;
    }

    .quote-text {
      margin: 4px 0 0;
      font-size: clamp(1.35rem, 2.2vw, 2.1rem);
      font-weight: 900;
      line-height: 1.35;
      letter-spacing: -.01em;
    }

    .msg-sub {
      font-size: clamp(1.1rem, 1.8vw, 1.5rem);
      color: #64748b;
      font-weight: 600;
    }

    .msg-main {
      margin: 8px 0 0;
      font-size: clamp(1.5rem, 2.6vw, 2.4rem);
      font-weight: 950;
      line-height: 1.25;
      letter-spacing: -.02em;
    }

    .highlight-mark {
      background: linear-gradient(transparent 55%, #fde68a 55%);
      padding: 0 4px;
    }

    .highlight-badge {
      display: inline-block;
      margin-top: 4px;
      padding: 5px 16px;
      background: var(--ink);
      color: #fbbf24;
      border-radius: 10px;
      box-shadow: 4px 4px 0 rgba(15,23,42,.25);
      transition: transform 200ms var(--ease-bounce);
    }

    .highlight-badge:hover {
      transform: scale(1.05) rotate(-1deg);
    }

    .point-box {
      border-left: 5px solid var(--ink);
      position: relative;
    }

    .point-box .underline-bold {
      border-bottom: 3px solid var(--ink);
      padding-bottom: 1px;
    }

    /* ── Model cards ── */
    .model-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 3px solid var(--ink);
      background: #fff;
      border-radius: 999px;
      padding: 8px 12px;
      box-shadow: var(--brutal-shadow-sm);
      font-weight: 900;
    }

    .bar {
      position: relative;
      border: 3px solid var(--ink);
      border-radius: 999px;
      background: #fff;
      height: 20px;
      overflow: hidden;
    }

    .bar > span {
      position: absolute;
      inset: 0;
      width: 0;
      transition: width 700ms var(--ease-smooth);
      background: repeating-linear-gradient(
        90deg, #22d3ee, #22d3ee 14px, #3b82f6 14px, #3b82f6 28px
      );
    }

    /* ── Footer ── */
    .footer {
      border: 5px solid var(--ink);
      border-radius: 18px;
      box-shadow: var(--brutal-shadow-sm);
      background: rgba(255,255,255,.96);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      gap: 10px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
    }

    .btns { display: flex; gap: 8px; }

    button {
      border: 3px solid var(--ink);
      border-radius: 12px;
      background: #fff;
      color: var(--ink);
      padding: 10px 16px;
      font-weight: 900;
      font-size: .95rem;
      cursor: pointer;
      box-shadow: var(--brutal-shadow-sm);
      transition: transform 140ms var(--ease-bounce), box-shadow 140ms ease, background 140ms ease;
    }

    button:hover:not(:disabled) {
      transform: translate(-2px, -2px);
      box-shadow: 8px 8px 0 var(--ink);
      background: #fef9c3;
    }

    button:active:not(:disabled) {
      transform: translate(3px, 3px);
      box-shadow: 1px 1px 0 var(--ink);
      transition-duration: 60ms;
    }

    button:disabled {
      opacity: .35;
      cursor: not-allowed;
    }

    button:focus-visible,
    .slide:focus-visible {
      outline: 3px solid #2563eb;
      outline-offset: 3px;
    }

    /* ── Tags ── */
    .tag {
      display: inline-block;
      border: 3px solid var(--ink);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: clamp(.95rem, 1.1vw, 1.15rem);
      font-weight: 900;
      background: #fff;
      box-shadow: 3px 3px 0 var(--ink);
      transition: transform 160ms var(--ease-bounce), box-shadow 160ms ease;
    }

    .tag:hover {
      transform: translate(-2px, -2px) rotate(-1deg);
      box-shadow: 6px 6px 0 var(--ink);
    }

    /* ── Cover ── */
    .cover-panel {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
    }

    .cover-line {
      font-size: clamp(1.5rem, 2.3vw, 2.25rem);
      font-weight: 900;
      line-height: 1.35;
      text-wrap: balance;
    }

    /* ── Colors ── */
    .bg-blue  { background: #bfdbfe; }
    .bg-cyan  { background: #a5f3fc; }
    .bg-pink  { background: #fbcfe8; }
    .bg-lime  { background: #d9f99d; }
    .bg-amber { background: #fde68a; }

    .muted { color: #334155; }

    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap; border: 0;
    }

    /* ── Roadmap ── */
    .roadmap-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .roadmap-item {
      border: 4px solid var(--ink);
      border-radius: 16px;
      box-shadow: var(--brutal-shadow-sm);
      padding: 14px;
      background: #fff;
      min-height: 190px;
      transition: transform 200ms var(--ease-bounce), box-shadow 200ms ease;
      position: relative;
      overflow: hidden;
    }

    .roadmap-item:hover {
      transform: translate(-3px, -3px) rotate(-.5deg);
      box-shadow: 10px 10px 0 var(--ink);
    }

    .roadmap-item.is-current::before {
      content: "NOW";
      position: absolute;
      top: 10px;
      right: -24px;
      background: var(--pink);
      color: #fff;
      font-size: .75rem;
      font-weight: 900;
      padding: 3px 28px;
      transform: rotate(45deg);
      border: 2px solid var(--ink);
    }

    .roadmap-month {
      display: inline-block;
      padding: 6px 12px;
      border: 3px solid var(--ink);
      border-radius: 999px;
      font-weight: 900;
      font-size: 1rem;
      background: #fff;
      box-shadow: 2px 2px 0 var(--ink);
      margin-bottom: 8px;
    }

    .roadmap-item h3 {
      margin: 0 0 8px;
      font-size: clamp(1.26rem, 1.65vw, 1.7rem);
      line-height: 1.2;
    }

    .roadmap-item p {
      margin: 0;
      font-size: clamp(1rem, 1.1vw, 1.2rem);
      line-height: 1.42;
      font-weight: 650;
      color: #334155;
    }

    /* ── Timeline ── */
    .timeline {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .timeline .card {
      position: relative;
      overflow: hidden;
    }

    .timeline .card::after {
      content: "";
      position: absolute;
      top: 14px; right: 14px;
      width: 14px; height: 14px;
      border-radius: 999px;
      border: 3px solid var(--ink);
      background: #fff;
      transition: background 200ms ease;
    }

    .timeline .card:hover::after {
      background: var(--lime);
    }

    /* ── About ── */
    .about-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .about-card h3 {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon-badge {
      display: inline-grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border: 3px solid var(--ink);
      border-radius: 12px;
      background: #fff;
      box-shadow: 3px 3px 0 var(--ink);
      font-size: 1.25rem;
      transition: transform 300ms var(--ease-bounce);
    }

    .about-card:hover .icon-badge {
      transform: rotate(-10deg) scale(1.1);
    }

    .about-point {
      margin-top: 8px;
      font-weight: 700;
      color: #1f2937;
    }

    /* ── Counter animation ── */
    .stat-num {
      display: inline-block;
      font-size: clamp(2rem, 3.5vw, 3.5rem);
      font-weight: 950;
      letter-spacing: -.03em;
      line-height: 1;
    }

    .stat-label {
      font-size: clamp(.9rem, 1vw, 1.1rem);
      font-weight: 700;
      color: #475569;
      margin-top: 4px;
    }

    /* ── Model grid ── */
    .model-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .model-card {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .model-head {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .model-logo {
      width: 72px;
      height: 72px;
      object-fit: contain;
      background: #fff;
      border: 3px solid var(--ink);
      border-radius: 14px;
      box-shadow: 3px 3px 0 var(--ink);
      padding: 6px;
      transition: transform 300ms var(--ease-bounce);
    }

    .card:hover .model-logo {
      transform: rotate(-5deg) scale(1.05);
    }

    .model-name {
      font-size: clamp(1.4rem, 2vw, 2rem);
      font-weight: 900;
      line-height: 1.1;
    }

    .model-sub {
      font-size: clamp(1rem, 1.1vw, 1.2rem);
      font-weight: 700;
      color: #334155;
      margin-top: 4px;
    }

    .model-list {
      margin: 0;
      padding-left: 1.2rem;
      display: grid;
      gap: 8px;
      font-size: clamp(1rem, 1.05vw, 1.2rem);
      line-height: 1.35;
      font-weight: 700;
    }

    /* ── Practice ── */
    .practice-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .step-card {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 230px;
    }

    .step-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .step-num {
      display: inline-grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 3px solid var(--ink);
      background: #fff;
      font-weight: 900;
      font-size: 1.15rem;
      box-shadow: 3px 3px 0 var(--ink);
      transition: transform 200ms var(--ease-bounce), background 200ms ease;
    }

    .step-card:hover .step-num {
      transform: rotate(-8deg) scale(1.08);
      background: #fef9c3;
    }

    .practice-tip {
      margin-top: 12px;
      border: 4px dashed var(--ink);
      border-radius: 14px;
      padding: 14px;
      background: #fef9c3;
      box-shadow: 4px 4px 0 var(--ink);
      font-size: clamp(1rem, 1.06vw, 1.15rem);
      font-weight: 700;
      transition: transform 200ms var(--ease-bounce), box-shadow 200ms ease;
    }

    .practice-tip:hover {
      transform: translate(-2px, -2px);
      box-shadow: 7px 7px 0 var(--ink);
    }

    .download-links {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .download-links a {
      text-decoration: none;
      color: inherit;
    }

    /* ── Decorative stamps ── */
    .stamp {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 14px;
      border: 3px solid var(--ink);
      border-radius: 8px;
      font-weight: 900;
      font-size: .85rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      transform: rotate(-3deg);
      box-shadow: 2px 2px 0 var(--ink);
    }

    /* ── Arrow connector between timeline cards ── */
    .arrow-connector {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--ink);
    }

    /* ── Floating decoration ── */
    .float-decor {
      position: absolute;
      pointer-events: none;
      z-index: 0;
      opacity: .12;
      font-size: 6rem;
      animation: floatBob 4s ease-in-out infinite;
    }

    @keyframes floatBob {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(3deg); }
    }

    /* ── Keyboard hint ── */
    .key-hint {
      position: fixed;
      bottom: 80px;
      right: 24px;
      z-index: 100;
      display: flex;
      gap: 6px;
      opacity: 0;
      transition: opacity 400ms ease;
      pointer-events: none;
    }

    .key-hint.show { opacity: 1; }

    .key-hint kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      height: 36px;
      padding: 0 10px;
      border: 3px solid var(--ink);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 3px 0 var(--ink);
      font-weight: 900;
      font-size: .8rem;
      font-family: inherit;
    }

    /* ── Slide number badge ── */
    .slide-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 10;
      display: inline-grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border: 3px solid var(--ink);
      border-radius: 10px;
      background: #fff;
      box-shadow: 3px 3px 0 var(--ink);
      font-weight: 950;
      font-size: .9rem;
      opacity: .5;
      transition: opacity 200ms ease, transform 200ms var(--ease-bounce);
    }

    .slide-badge:hover {
      opacity: 1;
      transform: scale(1.1) rotate(-3deg);
    }

    /* ── Security slide ── */
    .security-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .security-item {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: start;
      gap: 12px;
      border: 3px solid var(--ink);
      border-radius: 14px;
      padding: 14px;
      background: #fff;
      box-shadow: var(--brutal-shadow-sm);
      transition: transform 200ms var(--ease-bounce), box-shadow 200ms ease;
    }

    .security-item:hover {
      transform: translate(-3px, -3px) rotate(-.3deg);
      box-shadow: 10px 10px 0 var(--ink);
    }

    .security-num {
      display: inline-grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border: 3px solid var(--ink);
      border-radius: 10px;
      background: #fff;
      font-weight: 950;
      font-size: .95rem;
      box-shadow: 2px 2px 0 var(--ink);
      flex-shrink: 0;
    }

    .security-text {
      font-size: clamp(.95rem, 1.15vw, 1.15rem);
      font-weight: 700;
      line-height: 1.4;
      color: #1e293b;
    }

    .security-text .sec-bold {
      font-weight: 900;
      color: var(--ink);
      background: linear-gradient(transparent 60%, #fecdd3 60%);
      padding: 0 3px;
    }

    .security-text .sec-sub {
      display: block;
      margin-top: 4px;
      font-size: .88em;
      font-weight: 600;
      color: #64748b;
    }

    .security-banner {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 14px 20px;
      border: 4px dashed var(--ink);
      border-radius: 16px;
      background: linear-gradient(135deg, #fef9c3, #fde68a);
      box-shadow: var(--brutal-shadow-sm);
      font-weight: 900;
      font-size: clamp(1rem, 1.3vw, 1.3rem);
      text-align: center;
      line-height: 1.4;
    }

    /* ── Prompt formula slide ── */
    .prompt-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .prompt-formula {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 20px;
      border: 5px solid var(--ink);
      border-radius: 20px;
      background: linear-gradient(135deg, #fef9c3 0%, #e0f2fe 50%, #fce7f3 100%);
      box-shadow: var(--brutal-shadow);
      flex-wrap: wrap;
    }

    .prompt-block {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border: 4px solid var(--ink);
      border-radius: 14px;
      font-weight: 900;
      font-size: clamp(1.05rem, 1.4vw, 1.4rem);
      box-shadow: var(--brutal-shadow-sm);
      transition: transform 200ms var(--ease-bounce), box-shadow 200ms ease;
    }

    .prompt-block:hover {
      transform: translate(-3px, -3px) rotate(-1deg);
      box-shadow: 10px 10px 0 var(--ink);
    }

    .prompt-plus {
      font-size: 1.6rem;
      font-weight: 950;
      color: var(--ink);
    }

    .prompt-equals {
      font-size: 1.6rem;
      font-weight: 950;
      color: var(--ink);
    }

    .prompt-result {
      padding: 10px 20px;
      border: 4px solid var(--ink);
      border-radius: 14px;
      background: var(--ink);
      color: #fbbf24;
      font-weight: 950;
      font-size: clamp(1.1rem, 1.5vw, 1.5rem);
      box-shadow: var(--brutal-shadow-sm);
      letter-spacing: .02em;
    }

    .prompt-card-num {
      display: inline-grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border: 4px solid var(--ink);
      border-radius: 12px;
      background: #fff;
      font-weight: 950;
      font-size: 1.2rem;
      box-shadow: 3px 3px 0 var(--ink);
      flex-shrink: 0;
    }

    .prompt-detail-card {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .prompt-detail-card h3 {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .prompt-example {
      margin-top: 8px;
      padding: 12px 14px;
      border: 3px dashed var(--ink);
      border-radius: 12px;
      background: rgba(255,255,255,.7);
      font-size: clamp(.92rem, 1.05vw, 1.1rem);
      font-weight: 700;
      line-height: 1.5;
      color: #334155;
    }

    .prompt-example strong {
      color: var(--ink);
    }

    .prompt-example .prompt-em {
      display: inline;
      background: linear-gradient(transparent 60%, #a5f3fc 60%);
      padding: 0 2px;
      font-weight: 900;
      color: var(--ink);
    }

    .prompt-full {
      grid-column: 1 / -1;
    }

    .prompt-full-box {
      margin-top: 10px;
      padding: 16px;
      border: 4px solid var(--ink);
      border-radius: 16px;
      background: linear-gradient(145deg, #f0fdf4, #ecfdf5);
      box-shadow: var(--brutal-shadow-sm);
      font-size: clamp(1rem, 1.2vw, 1.2rem);
      font-weight: 750;
      line-height: 1.6;
      color: #1e293b;
    }

    .prompt-full-box .pf-role { background: linear-gradient(transparent 60%, #fde68a 60%); padding: 0 3px; font-weight: 900; }
    .prompt-full-box .pf-insight { background: linear-gradient(transparent 60%, #a5f3fc 60%); padding: 0 3px; font-weight: 900; }
    .prompt-full-box .pf-tone { background: linear-gradient(transparent 60%, #fbcfe8 60%); padding: 0 3px; font-weight: 900; }

    /* ── QA / Closing slide ── */
    .qa-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto 1fr;
      gap: 14px;
    }

    .qa-hero {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 18px 24px;
      border: 5px solid var(--ink);
      border-radius: 20px;
      background: linear-gradient(135deg, #fef9c3 0%, #fbcfe8 35%, #a5f3fc 65%, #d9f99d 100%);
      box-shadow: var(--brutal-shadow);
      position: relative;
      overflow: hidden;
    }

    .qa-hero::before {
      content: "?";
      position: absolute;
      right: -10px;
      top: -20px;
      font-size: 12rem;
      font-weight: 950;
      color: rgba(15,23,42,.04);
      line-height: 1;
      pointer-events: none;
      font-family: Georgia, serif;
    }

    .qa-hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 8px,
        rgba(255,255,255,.15) 8px,
        rgba(255,255,255,.15) 16px
      );
      pointer-events: none;
    }

    .qa-hero-text {
      font-size: clamp(1.3rem, 2.2vw, 2rem);
      font-weight: 900;
      line-height: 1.35;
      letter-spacing: -.01em;
    }

    .qa-hero-text .qa-small {
      display: block;
      font-size: .7em;
      font-weight: 700;
      color: #334155;
      margin-top: 4px;
    }

    .next-preview {
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
    }

    .next-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .next-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border: 3px solid var(--ink);
      border-radius: 999px;
      background: var(--ink);
      color: #fff;
      font-weight: 900;
      font-size: .85rem;
      letter-spacing: .03em;
      box-shadow: 3px 3px 0 rgba(15,23,42,.2);
    }

    .next-badge .arrow-icon {
      display: inline-block;
      animation: arrowPulse 1.2s ease-in-out infinite;
    }

    @keyframes arrowPulse {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(4px); }
    }

    .next-keyword {
      display: inline-block;
      padding: 8px 14px;
      border: 3px solid var(--ink);
      border-radius: 10px;
      font-weight: 900;
      font-size: clamp(1rem, 1.2vw, 1.2rem);
      box-shadow: 3px 3px 0 var(--ink);
      transition: transform 200ms var(--ease-bounce), box-shadow 200ms ease;
    }

    .next-keyword:hover {
      transform: translate(-2px, -2px) rotate(-1deg);
      box-shadow: 6px 6px 0 var(--ink);
    }

    .next-keywords {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .recap-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .recap-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 3px solid var(--ink);
      border-radius: 12px;
      background: #fff;
      box-shadow: 3px 3px 0 var(--ink);
      font-weight: 750;
      font-size: clamp(.95rem, 1.1vw, 1.12rem);
      line-height: 1.3;
      transition: transform 200ms var(--ease-bounce), box-shadow 200ms ease;
    }

    .recap-item:hover {
      transform: translate(-2px, -2px) rotate(-.5deg);
      box-shadow: 6px 6px 0 var(--ink);
    }

    .recap-check {
      display: inline-grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border: 3px solid var(--ink);
      border-radius: 8px;
      background: #fff;
      font-size: .85rem;
      font-weight: 900;
      flex-shrink: 0;
      box-shadow: 2px 2px 0 var(--ink);
      transition: background 300ms ease, transform 300ms var(--ease-bounce);
    }

    .recap-item.checked .recap-check {
      background: var(--lime);
      transform: scale(1.05) rotate(-3deg);
    }

    /* ── Lightbox ── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 20% 30%, rgba(167, 243, 208, .45) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(191, 219, 254, .45) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(254, 243, 199, .5) 0%, transparent 60%),
        rgba(255, 255, 255, .82);
      backdrop-filter: blur(16px) saturate(1.4);
      -webkit-backdrop-filter: blur(16px) saturate(1.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 350ms ease;
      cursor: pointer;
    }

    .lightbox.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .lightbox-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .lightbox-img {
      width: min(75vw, 380px);
      height: auto;
      border: 5px solid var(--ink);
      border-radius: 32px;
      box-shadow:
        var(--brutal-shadow-lg),
        0 0 0 8px rgba(255,255,255,.7),
        0 20px 50px rgba(15, 23, 42, .1);
      background: linear-gradient(145deg, #ffffff, #fef9c3, #e0f2fe);
      padding: 20px;
      object-fit: contain;
      transform: scale(.8) translateY(20px);
      transition: transform 450ms var(--ease-bounce);
    }

    .lightbox.is-open .lightbox-img {
      transform: scale(1) translateY(0);
    }

    .lightbox-label {
      padding: 10px 22px;
      border: 3px solid var(--ink);
      border-radius: 999px;
      background: #fff;
      box-shadow: var(--brutal-shadow-sm);
      font-weight: 900;
      font-size: 1.1rem;
      color: var(--ink);
      letter-spacing: .01em;
      transform: translateY(10px);
      opacity: 0;
      transition: transform 400ms var(--ease-bounce) 150ms, opacity 300ms ease 150ms;
    }

    .lightbox.is-open .lightbox-label {
      transform: translateY(0);
      opacity: 1;
    }

    .lightbox-hint {
      position: absolute;
      bottom: clamp(16px, 3vh, 36px);
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 16px;
      border-radius: 999px;
      background: rgba(15, 23, 42, .06);
      font-weight: 700;
      font-size: .82rem;
      color: #94a3b8;
      pointer-events: none;
    }

    .cover-logo {
      cursor: pointer;
    }

    /* ── Responsive ── */
    @media (max-width: 980px) {
      .grid-4, .timeline { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid-3 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .model-grid { grid-template-columns: 1fr; }
      .roadmap-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .practice-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 700px) {
      .app { padding: 10px; gap: 10px; }
      .grid-4, .grid-3, .grid-2, .timeline, .about-grid, .roadmap-grid, .practice-grid, .qa-layout, .security-grid, .prompt-layout { grid-template-columns: 1fr; }
      .prompt-formula { flex-direction: column; }
      .prompt-full, .prompt-full { grid-column: 1; }
      .qa-layout { grid-template-rows: auto auto auto; }
      .qa-hero { grid-column: 1; flex-direction: column; text-align: center; }
      .instructor-wrap, .instructor-meta { grid-template-columns: 1fr; }
      .slide { padding: 14px; }
      .footer { flex-wrap: wrap; }
      .key-hint { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="progressWrap" class="progress-wrap" role="progressbar" aria-valuemin="1" aria-valuemax="12" aria-valuenow="1" aria-valuetext="1 / 12">
      <div id="progress" class="progress"></div>
    </div>

    <main class="stage" aria-live="polite">
      <section id="slide" class="slide" tabindex="0"></section>
      <div id="sr" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>
    </main>

    <footer class="footer">
      <div class="brand">
        <img class="logo" src="img/grae-i_logo.png" alt="고래.I 로고" />
        <span>고래.I 오리엔테이션 2026</span>
        <span id="counter" class="tag bg-cyan">1 / 12</span>
      </div>
      <div class="btns">
        <button id="prev" aria-label="이전 슬라이드">← 이전</button>
        <button id="next" aria-label="다음 슬라이드">다음 →</button>
      </div>
    </footer>
  </div>

  <div id="lightbox" class="lightbox" aria-label="로고 확대 보기">
    <div class="lightbox-inner">
      <img class="lightbox-img" src="img/grae-i_logo.png" alt="고래.I 로고 확대" />
      <span class="lightbox-label">고래.I — 울산 교육청 AI 학습 연구 동아리</span>
    </div>
    <span class="lightbox-hint">아무 곳이나 클릭하면 닫힙니다</span>
  </div>

  <div id="keyHint" class="key-hint">
    <kbd>←</kbd><kbd>→</kbd>
  </div>

  <script>
    const slides = [
      {
        id: "s1-cover",
        render: () => `
          <div>
            <span class="kicker bg-amber" data-anim style="animation-delay:0ms">🐳 AI와 첫 만남</span>
            <h1 class="title" data-anim style="animation-delay:80ms">오리엔테이션<br><span class="accent">고래.I</span></h1>
            <p class="subtitle" data-anim style="animation-delay:160ms">2026년 3월 | 울산광역시교육청\n기초반 A·B (각 49명) | 2시간 수업</p>
          </div>
          <div class="panel bg-cyan cover-panel" data-anim style="animation-delay:240ms">
            <div class="meta">
              <img class="logo cover-logo" src="img/grae-i_logo.png" alt="고래.I 로고" />
              <span class="tag bg-lime">기초반 A·B</span>

      progressWrapEl.setAttribute("aria-valuemax", String(slides.length));
      progressWrapEl.setAttribute("aria-valuenow", String(current + 1));
      progressWrapEl.setAttribute("aria-valuetext", `${current + 1} / ${slides.length}`);
      counterEl.textContent = `${current + 1} / ${slides.length}`;
      prevBtn.disabled = current === 0;
      nextBtn.disabled = current === slides.length - 1;
      srEl.textContent = `${current + 1}번 슬라이드`;
      slideEl.focus({ preventScroll: true });

      // Trigger counter animations
      requestAnimationFrame(animateCounters);

      // Trigger slide-specific onMount
      if (slides[current].onMount) {
        slides[current].onMount();
      }
    }

    function next() {
      if (current < slides.length - 1) {
        direction = 1;
        current += 1;
        render();
      }
    }

    function prev() {
      if (current > 0) {
        direction = -1;
        current -= 1;
        render();
      }
    }

    prevBtn.addEventListener("click", prev);
    nextBtn.addEventListener("click", next);

    // Keyboard navigation
    window.addEventListener("keydown", (e) => {
      if (["ArrowRight", " ", "PageDown"].includes(e.key)) { e.preventDefault(); next(); }
      if (["ArrowLeft", "PageUp"].includes(e.key)) { e.preventDefault(); prev(); }
      if (e.key === "Home") { e.preventDefault(); direction = -1; current = 0; render(); }
      if (e.key === "End") { e.preventDefault(); direction = 1; current = slides.length - 1; render(); }
    });

    // Touch / swipe support
    slideEl.addEventListener("touchstart", (e) => {
      touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    slideEl.addEventListener("touchend", (e) => {
      const diff = e.changedTouches[0].screenX - touchStartX;
      if (Math.abs(diff) > 50) {
        if (diff < 0) next();
        else prev();
      }
    }, { passive: true });

    // Lightbox for cover logo
    const lightbox = document.getElementById("lightbox");

    document.addEventListener("click", (e) => {
      if (e.target.closest(".cover-logo")) {
        lightbox.classList.add("is-open");
      }
    });

    lightbox.addEventListener("click", () => {
      lightbox.classList.remove("is-open");
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && lightbox.classList.contains("is-open")) {
        lightbox.classList.remove("is-open");
      }
    });

    render();
  </script>
</body>
</html>
